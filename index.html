<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keigo</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">

</head>

<body>

<div class="background">
  <video autoplay muted loop playsinline class="bgVideo">
    <source src="fondokei.mp4" type="video/mp4">
  </video>
</div>

<div class="particles"></div>

<!-- LOGIN -->

<section class="login" id="login">

<div class="loginBox">

<h1>Keigo</h1>

  <input id="user" placeholder="username">
<input id="pass" placeholder="password" type="password">

<button onclick="enterSite()">

Enter

</button>

</div>

</section>


<!-- HERO -->

<section class="hero hidden" id="hero">

<img src="https://i.postimg.cc/qBL2qSH5/doro.png" class="character">

<h2 id="title">

Keigo

</h2>

<p class="tag">

Stark wie rock.

</p>

</section>

<!-- ABOUT -->

<section class="about hidden" id="about">

<div class="aboutCard">

<div class="left">

<img src="assets/keigo.png">

<div class="quote">

Lorem ipsum dolor sit amet consectetur

</div>

</div>

<div class="right">

<h3>

Keigo

</h3>

<p class="id">

IDNUMXXXX

</p>

<div class="data">

<div>

<label>Name</label>

<span>Ferch</span>

</div>

<div>

<label>Country</label>

<span>Mexico</span>

</div>

<div>

<label>Favorite Number</label>

<span>22</span>

</div>

</div>

</div>

<div class="close" onclick="closeAbout()">

✕

</div>

</div>

</section>

<!-- MUSIC -->

<div class="music">

<button onclick="toggleMusic()">

♫

</button>

</div>

<audio id="player" loop>

<source src="assets/music.mp3">

</audio>

<script src="script.js"></script>

</body>

</html>

</html>
