<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seiren</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="fade"></div>
<div id="glitch"></div>
<div class="background" id="bg"></div>
<div class="particles"></div>

<!-- LOGIN -->

<section class="login" id="login">
<div class="loginBox">
<h1>Seiren</h1>

<input id="user" placeholder="username">
<input id="pass" placeholder="password" type="password">

<button onclick="enterSite()">Enter</button>
</div>
</section>

<!-- CONTENIDO PRINCIPAL -->

<div id="main" class="hidden">

<!-- HERO -->

<section class="hero section" id="hero">

<img src="https://i.postimg.cc/2S17WjtY/Nara-Shikamaru-full-714829-copia.png" class="character">

<h2 id="title">Seiren</h2>

<div class="scrollDown">↓</div>

</section>

<!-- POSTS -->

<section class="posts section" id="posts">

<div class="post">
<img src="https://i.postimg.cc/1RMGYNhM/tumblr-0c64585047de62ad310a3907a78b3584-7878e782-540.gif">
<p>La pereza también es estrategia.</p>
</div>

<div class="post">
<img src="https://i.postimg.cc/C1yrvn8h/tumblr-73ca0256dde3dba1ce6d8b2dcd92bb7d-73cd4857-540.gif">
<p>Pensar demasiado también es poder.</p>
</div>

</section>

</div>

<!-- ABOUT -->

<section class="about hidden" id="about">
<div class="aboutCard">

<div class="left">
<img src="https://i.postimg.cc/C1yrvn8h/tumblr-73ca0256dde3dba1ce6d8b2dcd92bb7d-73cd4857-540.gif">
<div class="quote">Troublesome...</div>
</div>

<div class="right">
<h3>Seiren</h3>
<p>IDNUMXXXX</p>

<div class="data">
<div><label>Name</label><span>Ferch</span></div>
<div><label>Country</label><span>Mexico</span></div>
<div><label>Favorite Number</label><span>22</span></div>
</div>

</div>

<div class="close" onclick="closeAbout()">✕</div>

</div>
</section>

<!-- MUSIC -->

<div class="music">
<button onclick="toggleMusic()">♫</button>
</div>

<audio id="player" loop>
<source src="assets/music.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
